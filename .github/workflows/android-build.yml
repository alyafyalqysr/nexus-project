name: Build Android APK Direct

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Android Project Files Automatically
        run: |
          mkdir -p android-app/app/src/main/java/com/nexus/mobile
          mkdir -p android-app/app/src/main/res/layout
          mkdir -p android-app/app/src/main/res/values

          # 1. settings.gradle
          cat << 'EOF' > android-app/settings.gradle
          rootProject.name = "NexusMobile"
          include ":app"
          EOF

          # 2. Top-level build.gradle
          cat << 'EOF' > android-app/build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath "com.android.tools.build:gradle:7.4.2" }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 3. gradle.properties
          cat << 'EOF' > android-app/gradle.properties
          org.gradle.jvmargs=-Xmx2g
          android.useAndroidX=true
          EOF

          # 4. App-level build.gradle
          cat << 'EOF' > android-app/app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              compileSdk 33
              defaultConfig {
                  applicationId "com.nexus.mobile"
                  minSdk 23
                  targetSdk 33
                  versionCode 1
                  versionName "0.1"
              }
              namespace 'com.nexus.mobile'
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.9.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.8.0'
          }
          EOF

          # 5. AndroidManifest.xml
          cat << 'EOF' > android-app/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.github.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:label="NEXUS Mobile"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.AppCompat.Light.NoActionBar">
              </application>
          </manifest>
          EOF

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.5

      - name: Run Build (Assemble Debug APK)
        run: |
          cd android-app
          gradle assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: nexus-apk
          path: android-app/app/build/outputs/apk/debug/*.apk
